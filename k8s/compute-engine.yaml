apiVersion: apps/v1
kind: Deployment
metadata:
  name: compute-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: compute-engine
  template:
    metadata:
      labels:
        app: compute-engine
    spec:
      containers:
        - name: compute-engine
          image: orbital-debris-tracker/compute-engine:latest
          ports:
            - containerPort: 7001
