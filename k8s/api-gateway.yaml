apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: orbital-debris-tracker/api-gateway:latest
          env:
            - name: COMPUTE_ENGINE_URL
              value: http://compute-engine:7001
            - name: REDIS_URL
              value: redis://redis:6379/0
          ports:
            - containerPort: 8000
