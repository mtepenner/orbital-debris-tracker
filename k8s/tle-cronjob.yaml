apiVersion: batch/v1
kind: CronJob
metadata:
  name: tle-syncer
spec:
  schedule: "0 */6 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: tle-syncer
              image: orbital-debris-tracker/tle-syncer:latest
