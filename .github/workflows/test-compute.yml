name: Test Compute

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run ingestion tests
        run: |
          cd tle_ingestion
          go test ./...

      - name: Run compute tests
        run: |
          cd compute_engine
          go test ./...

      - name: Validate API gateway package
        run: |
          python -m compileall api_gateway/app

      - name: Validate frontend build
        run: |
          cd frontend
          npm install
          npm run build
